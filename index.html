<style>

/* VORLAGEN */

/* ANPASSEN DIALOG */
.adjust-box{background:#f5f2ed;border:1.5px solid #d4d0c8;border-radius:10px;padding:14px;margin-top:10px}
.adjust-title{font-size:12px;font-family:'Courier New',monospace;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;font-weight:700}
.adjust-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.adjust-label{font-size:13px;color:#111;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.adjust-input{width:80px;background:#fff;border:1.5px solid #bbb;border-radius:7px;padding:7px 10px;font-size:14px;font-family:'Courier New',monospace;color:#111;text-align:right;font-weight:600}
.adjust-unit{font-size:12px;color:#888;font-family:'Courier New',monospace;width:24px;font-weight:600}
.adjust-remove{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:0 0 0 6px;line-height:1;flex-shrink:0;font-weight:600}

.manual-box{background:#f5f2ed;border:1.5px solid #d4d0c8;border-radius:10px;padding:14px;margin-top:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
/* VORLAGE SPEICHERN DIALOG */
.save-template-box{background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:10px;padding:14px;margin-top:10px}

<body>
<div id="app"></div>
<script src="foods.js"></script>
<script>
// ═══ STORAGE ═══════════════════════════════════════════════════════
const N_KEY='nutrition_app_data';
const T_KEY='training_app_data';
function ls(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function loadN(){return ls(N_KEY,{});}
function saveN(patch){const d={...loadN(),...patch,_version:2,_updated:new Date().toISOString()};lss(N_KEY,d);}
function loadT(){return ls(T_KEY,{});}

// ═══ MIGRATION ════════════════════════════════════════════════════
(function migrate(){
  const d=loadN();
  if(d._migrated) return;
  const settings=ls('nc_settings',null);
  const wlog=ls('nc_weight_log',{});
  const days={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith('nc_day_')){
      const date=k.replace('nc_day_','');
      try{days[date]=JSON.parse(localStorage.getItem(k));}catch{}
    }
  }
  const profile=settings?{weight:settings.weight||'',height:settings.height||'',age:settings.age||'',gender:settings.gender||'male',goal:settings.goal||'recomp',activityLevel:settings.activityLevel||'moderate'}:{};
  saveN({_migrated:true,_migratedAt:new Date().toISOString(),profile,days,weightLog:wlog,customFoods:{},mealTemplates:[]});
})();

// ═══ PARSER ════════════════════════════════════════════════════════
const UNITS={g:1,gr:1,gramm:1,gram:1,kg:1000,ml:1,milliliter:1,l:1000,el:15,esslöffel:15,tbsp:15,tl:5,teelöffel:5,tsp:5,portion:100,scheibe:30,scheiben:30,stk:1,stück:1,stueck:1,x:1};
// Geschätzte Gramm für unscharfe Mengenbegriffe (v.a. bei Nüssen/Samen)
const FUZZY_QTY={
  'handvoll':30,'eine handvoll':30,'kleine handvoll':20,'große handvoll':40,'grosse handvoll':40,
  'ein paar':20,'paar':20,'wenig':15,'etwas':20,
};
const NUT_SEED_CATS=['Nüsse']; // Kategorien, für die "Handvoll" typisch ist

function normalize(s){
  return s.toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9\s]/g,'').trim();
}
function findFood(name){
  const q=normalize(name);
  // PRIORITÄT 1: Eigene Lebensmittel (exakter Match) – Custom-Foods zuerst prüfen
  const custom=loadN().customFoods||{};
  for(const cf of Object.values(custom)){
    if(normalize(cf.n)===q||(cf.s||[]).some(s=>normalize(s)===q)) return cf;
  }
  // PRIORITÄT 2: Exakter Treffer in Hauptdatenbank
  for(const f of FOODS){for(const s of[f.n,...(f.s||[])]){if(normalize(s)===q)return f;}}
  // PRIORITÄT 3: Eigene Lebensmittel (Teilstring-Match)
  for(const cf of Object.values(custom)){
    const cn=normalize(cf.n);
    if(q.includes(cn)||cn.includes(q)) return cf;
  }
  // PRIORITÄT 4: Hauptdatenbank Teilstring-Match (am unspezifischsten, daher zuletzt)
  for(const f of FOODS){for(const s of[f.n,...(f.s||[])]){const sn=normalize(s);if(q.includes(sn)||sn.includes(q))return f;}}
  return null;
}

function parseMealText(text){
  const results=[],unknown=[];
  const parts=text.split(/[,;+]|\bund\b/i).map(s=>s.trim()).filter(Boolean);
  for(const part of parts){
    let handled=false;

    // 1) Fuzzy-Mengenbegriffe ohne Zahl: "Handvoll Walnüsse", "ein paar Champignons", "kleine Handvoll Mandeln"
    for(const phrase of Object.keys(FUZZY_QTY).sort((a,b)=>b.length-a.length)){
      const re=new RegExp('^'+phrase.replace(/\s+/g,'\\s+')+'\\s+(.+)$','i');
      const fm=part.match(re);
      if(fm){
        const foodName=fm[1].trim();
        const food=findFood(foodName);
        if(food){
          results.push({food,grams:FUZZY_QTY[phrase],display:`${phrase} ${foodName} (≈${FUZZY_QTY[phrase]}g)`});
          handled=true;
        }
        break;
      }
    }
    if(handled) continue;

    // 2) Standard: Zahl + optionale Einheit + Name
    const m=part.match(/^(\d+(?:[.,]\d+)?)\s*(g|gr|gramm|gram|kg|kilogramm|ml|milliliter|l|liter|el|esslöffel|tbsp|tl|teelöffel|tsp|portion|portionen|scheibe|scheiben|stk|stück|stueck|x)?\s+(.+)$/i);
    if(m){
      const qty=parseFloat(m[1].replace(',','.'));
      const unitRaw=m[2]||'';
      const unit=normalize(unitRaw)||'g';
      const foodName=m[3].trim();
      const food=findFood(foodName);
      const factor=UNITS[unit]||1;
      let grams=qty*factor;
      if(food){
        if((unit==='stk'||unit==='stück'||unit==='x'||!UNITS[unit])&&food._stk) grams=qty*food._stk;
        results.push({food,grams,display:`${qty}${unitRaw?unitRaw+' ':''}${foodName}`});
      } else {unknown.push(part);}
      continue;
    }

    // 3) Kein Zahlenformat erkannt – versuche das ganze Stück als Lebensmittelnamen (z.B. "Pilze", "Champignons")
    {
      const food=findFood(part);
      if(food){
        // Bei Nüssen/Samen ohne Mengenangabe: sinnvolle Standardportion statt 100g
        const defaultGrams=(food.cat==='Nüsse')?30:(food._stk||100);
        results.push({food,grams:defaultGrams,display:`${part} (≈${defaultGrams}g, geschätzt)`});
      } else {unknown.push(part);}
    }
  }
  return{results,unknown};
}
function calcNutrition(parsed){
  const sum={k:0,p:0,c:0,f:0,fi:0,mg:0,ca:0,fe:0,zn:0,po:0,o3:0,vd:0};
  for(const{food,grams}of parsed.results){
    const r=grams/100;
    for(const key of Object.keys(sum)) sum[key]+=(food[key]||0)*r;
  }
  return sum;
}

// ═══ TRAINING SYNC ════════════════════════════════════════════════
function getTrainingToday(){
  try{
    const t=loadT(),log=t.log||{},today=todayKey();
    let trained=false,sessionName='';
    Object.values(log).forEach(entries=>(entries||[]).forEach(e=>{if(e.date&&e.date.startsWith(today))trained=true;}));
    if(!trained) return null;
    const plan=t.plan;
    if(plan&&Array.isArray(plan))plan.forEach(ph=>(ph.sessions||[]).forEach(s=>(s.exercises||[]).forEach(ex=>{if((log[ex.id]||[]).some(e=>e.date&&e.date.startsWith(today)))sessionName=s.name||'';})));
    const n=sessionName.toLowerCase();
    if(n.includes('squat')||n.includes('lower'))return{type:'lower',label:'Unterkörper'};
    if(n.includes('press')||n.includes('push'))return{type:'upper',label:'Oberkörper'};
    if(n.includes('hinge')||n.includes('deadlift'))return{type:'heavy',label:'Schweres Training'};
    return{type:'full',label:'Training'};
  }catch{return null;}
}

// ═══ ZIELE ════════════════════════════════════════════════════════
function calcGoals(tt){
  const p=(loadN().profile||{});
  const w=parseFloat(p.weight)||80,h=parseFloat(p.height)||178,age=parseFloat(p.age)||30;
  const male=p.gender!=='female';
  const bmr=male?88.36+13.4*w+4.8*h-5.7*age:447.6+9.2*w+3.1*h-4.3*age;
  const tdee=bmr*({low:1.375,moderate:1.55,high:1.725}[p.activityLevel]||1.55);
  const cal=Math.round(tdee+({rest:-200,upper:0,lower:50,full:150,heavy:200}[tt]||0)+({recomp:0,bulk:300,cut:-400}[p.goal]||0));
  const protein=Math.round(w*(p.goal==='bulk'?2.2:2));
  const fat=Math.round(cal*0.25/9);
  const carbs=Math.round((cal-protein*4-fat*9)/4);
  return{cal,protein,carbs,fat,fiber:30};
}

// ═══ HELPERS ══════════════════════════════════════════════════════
function todayKey(){return new Date().toISOString().split('T')[0];}
function timeNow(){return new Date().toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit'});}
function pct(v,g){return g?Math.min(100,Math.round(v/g*100)):0;}
function ampel(p){if(p>=90)return{c:'#2e7d32',s:'✓'};if(p>=55)return{c:'#e65100',s:'~'};return{c:'#c62828',s:'!'};}

function getTodayData(){
  const d=loadN(),days=d.days||{},today=todayKey();
  if(!days[today])days[today]={trainingType:'rest',meals:[]};
  return days[today];
}
function saveTodayData(dayObj){
  const d=loadN();
  if(!d.days)d.days={};
  d.days[todayKey()]=dayObj;
  saveN({days:d.days});
}

// ═══ TRAINING TYPES ═══════════════════════════════════════════════
const TRAINING_TYPES=[
  {id:'rest',label:'Ruhetag',icon:'🛋️'},
  {id:'upper',label:'Oberkörper',icon:'💪'},
  {id:'lower',label:'Unterkörper',icon:'🦵'},
  {id:'full',label:'Ganzkörper',icon:'🔥'},
  {id:'heavy',label:'Schweres Training',icon:'🏋️'},
];

// Auto-detect
(function(){
  const day=getTodayData();
  if(day.trainingType==='rest'){const t=getTrainingToday();if(t){day.trainingType=t.type;saveTodayData(day);}}
})();

// ═══ STATE ════════════════════════════════════════════════════════
const S={
  mealInput:'',
  parsePreview:null,
  parseError:'',
  // Panel-Sichtbarkeit (alle gleichzeitig möglich: false = zu)
  showSearch:false,
  showManual:false,
  showTemplates:false,
  showSaveTemplate:false,
  searchQuery:'',
  searchResults:[],
  manualFood:{name:'',kcal:'',protein:'',carbs:'',fat:''},
  templateName:'',
  // Vorlage anpassen
  adjustTemplate:null,   // {template, items:[...], adjustedGrams:[...]}
  adjustAddText:'',
  adjustAddError:'',
  savingMealIdx:null,    // Index der Mahlzeit die als Vorlage gespeichert wird
};

// ═══ RENDER ═══════════════════════════════════════════════════════
function render(){
  document.getElementById('app').innerHTML=renderHeader()+`<div class="content">${renderBody()}</div>`;
}

function renderHeader(){
  return`<div class="topbar">
    <div class="topbar-left">
      <div class="topbar-sub">Ernährungs-Coach</div>
      <div class="topbar-title">${new Date().toLocaleDateString('de',{weekday:'long',day:'numeric',month:'long'})}</div>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="nav-link active">Log</a>
      <a href="coach.html" class="nav-link">Coach</a>
      <a href="tm7.html" class="nav-link">TM7</a>
      <a href="settings.html" class="nav-link">⚙</a>
    </div>
  </div>`;
}

function renderBody(){
  const day=getTodayData();
  const goals=calcGoals(day.trainingType||'rest');
  const meals=day.meals||[];
  const totals=meals.reduce((a,m)=>{
    a.k+=(m.k||0);a.p+=(m.p||0);a.c+=(m.c||0);a.f+=(m.f||0);a.fi+=(m.fi||0);
    a.mg+=(m.mg||0);a.ca+=(m.ca||0);a.fe2+=(m.fe2||0);a.zn+=(m.zn||0);
    a.po+=(m.po||0);a.o3+=(m.o3||0);a.vd+=(m.vd||0);
    return a;
  },{k:0,p:0,c:0,f:0,fi:0,mg:0,ca:0,fe2:0,zn:0,po:0,o3:0,vd:0});
  const trainingToday=getTrainingToday();

  return`
  ${trainingToday?`<div class="sync-banner"><div class="sync-dot"></div>Trainings-App: <strong style="margin-left:4px">${trainingToday.label}</strong>&nbsp;erkannt</div>`:''}

  <div class="card">
    <div class="card-title">Heutiger Tag</div>
    <div class="pill-row">
      ${TRAINING_TYPES.map(t=>`<button class="pill${day.trainingType===t.id?' active':''}" onclick="setTrainingType('${t.id}')">${t.icon} ${t.label}</button>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">Tagesziele</div>
    ${mBar('Kalorien',totals.k,goals.cal,'#e65100',' kcal')}
    ${mBar('Protein',totals.p,goals.protein,'#1565c0','g')}
    ${mBar('Kohlenhydrate',totals.c,goals.carbs,'#2e7d32','g')}
    ${mBar('Fett',totals.f,goals.fat,'#f9a825','g')}

    <div class="card-title">Mikronährstoffe <span style="color:#999;font-size:10px">(Schätzwerte)</span></div>
    <div class="micro-row">
      ${microBadge('Magnesium',totals.mg,400,'mg')}
      ${microBadge('Calcium',totals.ca,1000,'mg')}
      ${microBadge('Eisen',totals.fe2,15,'mg')}
      ${microBadge('Zink',totals.zn,10,'mg')}
      ${microBadge('Kalium',totals.po,3500,'mg')}
      ${microBadge('Omega-3',totals.o3,2,'g')}
      ${microBadge('Vit. D',totals.vd,20,'μg')}

    ${S.parseError?`<div class="error-box">${S.parseError}</div>`:''}
    ${S.parsePreview?renderParsePreview():''}

    <!-- ZEILE 1: Vorschau + Hinzufügen (immer sichtbar) -->

      <button class="btn-primary" onclick="previewMeal()">🔍 VORSCHAU</button>

    </div>

    <!-- ZEILE 2: Vorlagen + Suche + Eigenes (immer sichtbar) -->
    <div class="btn-row-2">
      <button class="btn-sm${S.showTemplates?' active-btn':''}" onclick="toggleTemplates()">📋 Vorlagen</button>
      <button class="btn-sm${S.showSearch?' active-btn':''}" onclick="toggleSearch()">🔍 Suche</button>

    ${S.showTemplates?renderTemplates():''}

    ${S.showSearch?renderSearch():''}

  ${meals.length>0?`
  <div class="card">
    <div class="card-title">Heute gegessen</div>
    ${meals.map((m,i)=>`
      <div class="meal-item">
        <div style="flex:1;min-width:0">

function mBar(label,val,goal,color,unit){
  const p=pct(val,goal);const{c,s}=ampel(p);
  return`<div class="macro-bar">
    <div class="macro-bar-head">
      <span class="macro-bar-label">${label}</span>
      <span class="macro-bar-val"><span style="color:${c};margin-right:3px">${s}</span>${Math.round(val)}<span style="color:#aaa">/${goal}${unit}</span></span>
    </div>
    <div class="macro-bar-track"><div class="macro-bar-fill" style="width:${p}%;background:${color}"></div></div>
  </div>`;
}

function microBadge(label,val,goal,unit){
  const p=pct(val,goal);const{c}=ampel(p);
  return`<div class="micro-badge" style="border-color:${c}55">
    <div class="micro-badge-label">${label}</div>
    <div class="micro-badge-val" style="color:${c}">${Math.round(val)}<span style="font-size:10px;color:#aaa">/${goal}${unit}</span></div>
  </div>`;
}

function renderParsePreview(){
  const{results,unknown}=S.parsePreview;
  const totals=calcNutrition(S.parsePreview);
  return`<div class="parse-result">
    <div style="font-size:11px;font-family:'Courier New',monospace;color:#666;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;font-weight:700">Vorschau</div>
    ${results.map(r=>`
      <div class="parse-row">
        <span class="parse-name">· ${r.display} (${Math.round(r.grams)}g)</span>
        <span class="parse-vals">${Math.round(r.food.k*r.grams/100)}kcal ${Math.round(r.food.p*r.grams/100)}g P</span>
      </div>`).join('')}
    ${unknown.length?`<div style="margin-top:6px"><span class="parse-unknown">⚠ Nicht erkannt: ${unknown.join(', ')}</span></div>`:''}
    <div style="margin-top:10px;padding-top:8px;border-top:1px solid #d4d0c8;display:flex;gap:14px;font-family:'Courier New',monospace;font-size:13px;flex-wrap:wrap;font-weight:700">
      <span style="color:#e65100">${Math.round(totals.k)} kcal</span>
      <span style="color:#1565c0">${Math.round(totals.p)}g P</span>
      <span style="color:#2e7d32">${Math.round(totals.c)}g K</span>
      <span style="color:#888">${Math.round(totals.f)}g F</span>
    </div>
  </div>`;
}

function renderSaveTemplate(){
  return`<div class="save-template-box">
    <div style="font-size:12px;font-family:'Courier New',monospace;color:#1b5e20;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px">Als Vorlage speichern</div>

function renderSearchResultsInner(){

// ═══ AKTIONEN ══════════════════════════════════════════════════════
function setTrainingType(id){const day=getTodayData();day.trainingType=id;saveTodayData(day);render();}

function previewMeal(){
  const txt=(document.getElementById('meal-txt')||{}).value||S.mealInput;
  if(!txt.trim()){S.parseError='Bitte Mahlzeit eingeben.';render();return;}
  S.mealInput=txt;S.parseError='';
  const parsed=parseMealText(txt);
  if(parsed.results.length===0&&parsed.unknown.length>0){
    S.parseError=`Nicht erkannt: ${parsed.unknown.join(', ')} – bitte Suche oder "+ Eigenes" nutzen.`;
    S.parsePreview=null;
  } else {S.parsePreview=parsed;}
  render();
}

function confirmMeal(){
  if(!S.parsePreview||!S.parsePreview.results.length) return;
  const totals=calcNutrition(S.parsePreview);
  const names=S.parsePreview.results.map(r=>r.display).join(', ');
  const meal={
    name:names,time:timeNow(),
    k:Math.round(totals.k),p:Math.round(totals.p),c:Math.round(totals.c),
    f:Math.round(totals.f),fi:Math.round(totals.fi),
    mg:Math.round(totals.mg),ca:Math.round(totals.ca),fe2:Math.round(totals.fe),
    zn:Math.round(totals.zn),po:Math.round(totals.po),
    o3:parseFloat(totals.o3.toFixed(1)),vd:parseFloat(totals.vd.toFixed(1)),
    _raw:S.mealInput, // für Vorlage-Speicherung
  };
  const day=getTodayData();
  if(!day.meals)day.meals=[];
  day.meals.push(meal);
  saveTodayData(day);
  S.mealInput='';S.parsePreview=null;S.parseError='';
  render();
}

function removeMeal(i){
  const day=getTodayData();
  day.meals.splice(i,1);
  saveTodayData(day);
  if(S.savingMealIdx===i)S.savingMealIdx=null;
  render();
}

function toggleSearch(){S.showSearch=!S.showSearch;S.showManual=false;S.showTemplates=false;S.showSaveTemplate=false;render();}
function toggleManual(){S.showManual=!S.showManual;S.showSearch=false;S.showTemplates=false;S.showSaveTemplate=false;render();}
function toggleTemplates(){S.showTemplates=!S.showTemplates;S.showSearch=false;S.showManual=false;S.showSaveTemplate=false;S.adjustTemplate=null;render();}

function doSearch(q){
  S.searchQuery=q;
  if(q.length<2){S.searchResults=[];}
  else{
    const nq=normalize(q);
    S.searchResults=FOODS.filter(f=>normalize(f.n).includes(nq)||(f.s||[]).some(s=>normalize(s).includes(nq)));
  }
  // Nur den Ergebnis-Container aktualisieren, NICHT render() – sonst verliert das Inputfeld den Fokus
  const container=document.getElementById('search-results-container');
  if(container) container.innerHTML=renderSearchResultsInner();
}

function addFromSearch(name){
  const food=findFood(name);if(!food)return;
  S.mealInput=(S.mealInput?S.mealInput+', ':'')+`100g ${name}`;
  S.showSearch=false;S.searchQuery='';S.searchResults=[];
  render();
  setTimeout(()=>{const t=document.getElementById('meal-txt');if(t)t.focus();},50);
}

function saveManualFood(){
  const m=S.manualFood;
  if(!m.name||!m.kcal){alert('Name und Kalorien sind Pflichtfelder.');return;}
  const food={n:m.name,s:[normalize(m.name)],cat:'Eigene',k:parseFloat(m.kcal)||0,p:parseFloat(m.protein)||0,c:parseFloat(m.carbs)||0,f:parseFloat(m.fat)||0,fi:0,mg:0,ca:0,fe:0,zn:0,po:0,o3:0,vd:0};
  const d=loadN();
  if(!d.customFoods)d.customFoods={};
  d.customFoods[normalize(m.name)]=food;
  saveN({customFoods:d.customFoods});
  FOODS.push(food);
  S.mealInput=(S.mealInput?S.mealInput+', ':'')+`100g ${m.name}`;
  S.showManual=false;
  S.manualFood={name:'',kcal:'',protein:'',carbs:'',fat:''};
  render();
  setTimeout(()=>{const t=document.getElementById('meal-txt');if(t)t.focus();},50);
}

// ── VORLAGEN AKTIONEN ─────────────────────────────────────────────
function startSaveAsTemplate(mealIdx){
  S.savingMealIdx=S.savingMealIdx===mealIdx?null:mealIdx;
  S.templateName='';
  render();
}

function saveMealAsTemplate(mealIdx){
  const name=S.templateName.trim();
  if(!name){alert('Bitte einen Namen eingeben.');return;}
  const day=getTodayData();
  const meal=day.meals[mealIdx];
  // Parse _raw text um Zutaten zu extrahieren
  const rawText=meal._raw||meal.name;
  const parsed=parseMealText(rawText);
  const items=parsed.results.map(r=>({foodName:r.food.n,grams:Math.round(r.grams)}));
  // Falls kein _raw: Mahlzeit als Ganzes speichern
  const template={
    name,
    k:meal.k,p:meal.p,c:meal.c,f:meal.f,
    items:items.length>0?items:[{foodName:meal.name,grams:100}],
    createdAt:new Date().toISOString(),
  };
  const d=loadN();
  if(!d.mealTemplates)d.mealTemplates=[];
  d.mealTemplates.push(template);
  saveN({mealTemplates:d.mealTemplates});
  S.savingMealIdx=null;S.templateName='';
  render();
}

function openAdjustTemplate(idx){
  const templates=loadN().mealTemplates||[];
  const template=templates[idx];
  if(!template)return;
  // Lokale Kopie der Items – Änderungen hier betreffen NICHT die gespeicherte Vorlage
  const items=(template.items||[]).map(item=>({...item}));
  S.adjustTemplate={
    template,
    items,
    adjustedGrams:items.map(item=>item.grams),
  };
  S.adjustAddText='';S.adjustAddError='';
  S.showTemplates=false;
  render();
}

function addAdjustItem(){
  const input=(document.getElementById('adjust-add-input')||{}).value||S.adjustAddText;
  if(!input||!input.trim()){return;}
  S.adjustAddError='';
  // Versuche die Eingabe wie eine Mahlzeitenzeile zu parsen: "1 TL Honig" / "60g Quark"
  const parsed=parseMealText(input.trim());
  if(parsed.results.length===0){
    S.adjustAddError=`Nicht erkannt: "${input.trim()}". Bitte Format wie "60g Honig" oder "1 EL Honig" nutzen.`;
    render();
    return;
  }
  parsed.results.forEach(r=>{
    S.adjustTemplate.items.push({foodName:r.food.n,grams:Math.round(r.grams)});
    S.adjustTemplate.adjustedGrams.push(Math.round(r.grams));
  });
  S.adjustAddText='';
  render();
  setTimeout(()=>{const t=document.getElementById('adjust-add-input');if(t)t.focus();},50);
}

function removeAdjustItem(i){
  S.adjustTemplate.items.splice(i,1);
  S.adjustTemplate.adjustedGrams.splice(i,1);
  render();
}

function logFromTemplate(){
  const at=S.adjustTemplate;
  if(!at)return;
  const items=at.items||[];
  if(items.length===0){alert('Keine Zutaten vorhanden.');return;}
  // Baue Freitext aus angepassten Mengen
  const parts=items.map((item,i)=>`${at.adjustedGrams[i]}g ${item.foodName}`);
  const txt=parts.join(', ');
  const parsed=parseMealText(txt);
  const totals=calcNutrition(parsed);
  const meal={
    name:at.template.name+' (Vorlage)',
    time:timeNow(),
    k:Math.round(totals.k),p:Math.round(totals.p),c:Math.round(totals.c),
    f:Math.round(totals.f),fi:Math.round(totals.fi),
    mg:Math.round(totals.mg),ca:Math.round(totals.ca),fe2:Math.round(totals.fe),
    zn:Math.round(totals.zn),po:Math.round(totals.po),
    o3:parseFloat(totals.o3.toFixed(1)),vd:parseFloat(totals.vd.toFixed(1)),
    _raw:txt,
  };
  const day=getTodayData();
  if(!day.meals)day.meals=[];
  day.meals.push(meal);
  saveTodayData(day);
  S.adjustTemplate=null;S.showTemplates=false;
  render();
}

function deleteTemplate(idx){
  if(!confirm('Vorlage löschen?'))return;
  const d=loadN();
  d.mealTemplates.splice(idx,1);
  saveN({mealTemplates:d.mealTemplates});
  render();
}

function saveCurrentAsTemplate(){
  const name=S.templateName.trim();
  if(!name){alert('Bitte einen Namen eingeben.');return;}
  const txt=(document.getElementById('meal-txt')||{}).value||S.mealInput;
  if(!txt.trim()){alert('Bitte zuerst eine Mahlzeit eingeben.');return;}
  const parsed=parseMealText(txt);
  if(parsed.results.length===0){alert('Keine Lebensmittel erkannt.');return;}
  const totals=calcNutrition(parsed);
  const items=parsed.results.map(r=>({foodName:r.food.n,grams:Math.round(r.grams)}));
  const template={name,k:Math.round(totals.k),p:Math.round(totals.p),c:Math.round(totals.c),f:Math.round(totals.f),items,createdAt:new Date().toISOString()};
  const d=loadN();
  if(!d.mealTemplates)d.mealTemplates=[];
  d.mealTemplates.push(template);
  saveN({mealTemplates:d.mealTemplates});
  S.showSaveTemplate=false;S.templateName='';
  render();
}

// ═══ PWA UPDATE ════════════════════════════════════════════════════
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    // Prüfe auf Update
    reg.addEventListener('updatefound',()=>{
      const newWorker=reg.installing;
      newWorker.addEventListener('statechange',()=>{
        if(newWorker.state==='installed'&&navigator.serviceWorker.controller){
          // Neuer SW verfügbar – Banner zeigen
          const banner=document.createElement('div');
          banner.innerHTML=`<div style="position:fixed;bottom:0;left:0;right:0;background:#1b5e20;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;z-index:999;font-family:'Courier New',monospace;font-size:13px;font-weight:600">
            <span>🔄 App-Update verfügbar</span>
            <button onclick="updateApp()" style="background:#fff;color:#1b5e20;border:none;border-radius:7px;padding:8px 16px;font-family:'Courier New',monospace;font-size:12px;font-weight:700;cursor:pointer">JETZT AKTUALISIEREN</button>
          </div>`;
          document.body.appendChild(banner);
        }
      });
    });
  }).catch(()=>{});
}

function updateApp(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(regs=>{
      Promise.all(regs.map(r=>r.unregister())).then(()=>{
        // Alle Caches löschen
        caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).then(()=>{
          window.location.reload(true);
        });
      });
    });
  } else {
    window.location.reload(true);
  }
}

render();
</script>
