// STORAGE (shared mit index.html)
// ═══════════════════════════════════════════════════════════════════
const N_KEY='nutrition_app_data';
const T_KEY='training_app_data';
function ls(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function loadN(){return ls(N_KEY,{});}
function saveN(patch){const d={...loadN(),...patch,_version:1,_updated:new Date().toISOString()};lss(N_KEY,d);}
function loadT(){return ls(T_KEY,{});}

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function todayKey(){return new Date().toISOString().split('T')[0];}
function getLastNDays(n){
  const a=[];
  for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(d.toISOString().split('T')[0]);}
  return a;
}
function dateLabel(k){return new Date(k+'T12:00:00').toLocaleDateString('de',{weekday:'short',day:'numeric'});}
function pct(v,g){return g?Math.min(100,Math.round(v/g*100)):0;}
function ampel(p){
  if(p>=90)return{c:'#2e7d32',s:'✓'};
  if(p>=55)return{c:'#e65100',s:'~'};
  return{c:'#c62828',s:'!'};
}
function round1(v){return Math.round(v*10)/10;}

// ═══════════════════════════════════════════════════════════════════
// TAGESDATEN LESEN
// ═══════════════════════════════════════════════════════════════════
function getDayData(dateKey){
  const d=loadN();
  return(d.days||{})[dateKey]||{trainingType:'rest',meals:[]};
}
function sumMeals(meals){
  return(meals||[]).reduce((a,m)=>{
    a.k+=(m.k||0);a.p+=(m.p||0);a.c+=(m.c||0);a.f+=(m.f||0);a.fi+=(m.fi||0);
    a.mg+=(m.mg||0);a.ca+=(m.ca||0);a.fe2+=(m.fe2||0);a.zn+=(m.zn||0);
    a.po+=(m.po||0);a.o3+=(m.o3||0);a.vd+=(m.vd||0);
    return a;
  },{k:0,p:0,c:0,f:0,fi:0,mg:0,ca:0,fe2:0,zn:0,po:0,o3:0,vd:0});
}

function calcGoals(tt,profile){
  const p=profile||loadN().profile||{};
  const w=parseFloat(p.weight)||80;
  const h=parseFloat(p.height)||178;
  const age=parseFloat(p.age)||30;
  const male=p.gender!=='female';
  const bmr=male?88.36+13.4*w+4.8*h-5.7*age:447.6+9.2*w+3.1*h-4.3*age;
  const am={low:1.375,moderate:1.55,high:1.725};
  const tdee=bmr*(am[p.activityLevel]||1.55);
  const bonus={rest:-200,upper:0,lower:50,full:150,heavy:200};
  const goalAdj={recomp:0,bulk:300,cut:-400};
  const cal=Math.round(tdee+(bonus[tt]||0)+(goalAdj[p.goal]||0));
  const protein=Math.round(w*(p.goal==='bulk'?2.2:2));
  const fat=Math.round(cal*0.25/9);
  const carbs=Math.round((cal-protein*4-fat*9)/4);
  return{cal,protein,carbs,fat,fiber:30};
}

// Gemüse + Proteinquellen = 2 Punkte (Schwergewicht), Rest = 1 Punkt

const HEALTH_FOOD_RANKING={
  proteinquellen:{label:"Proteinquellen",weight:2,icon:"🍗",
    matchFoods:["ei","eier","quark","skyr","hähnchen","hühnerbrust","pute","putenbrust","linsen","bohnen","kichererbsen","lachs","thunfisch","hering","makrele","sardine","tofu","tempeh","griechischer joghurt","hüttenkäse"]},
  gemüse:{label:"Gemüse",weight:2,icon:"🥦",
    matchFoods:["brokkoli","grünkohl","rotkohl","spinat","paprika","karotte","möhre","zucchini","aubergine","blumenkohl","champignon","pilz","tomate","gurke","sellerie","lauch","kürbis","rosenkohl","fenchel","kohl"]},
  rohkost:{label:"Rohkost",weight:1,icon:"🥗",
    matchFoods:["feldsalat","radieschen","chicorée","chicoree","salatherzen","rucola","eisbergsalat","blattsalat","gurke","karotte roh","tomate roh"]},
  obst:{label:"Obst",weight:1,icon:"🍓",
    matchFoods:["beeren","erdbeere","blaubeere","himbeere","brombeere","kiwi","apfel","orange","banane","mango","birne","ananas"]},
  kohlenhydratquellen:{label:"Kohlenhydratquellen",weight:1,icon:"🍚",
    matchFoods:["reis","kartoffel","süßkartoffel","haferflocken","quinoa","vollkorn","nudeln","brot","bulgur","couscous"]},
  fettquellen:{label:"Fettquellen",weight:1,icon:"🥑",
    matchFoods:["olivenöl","walnuss","avocado","leinsamen","hanfsamen","mandeln","chiasamen","kürbiskerne","sonnenblumenkerne"]},
  fermentiertes:{label:"Fermentiertes",weight:1,icon:"🫙",
    matchFoods:["sauerkraut","kefir","joghurt","kimchi","skyr"]},
  kraeuter:{label:"Kräuter/Gewürze",weight:1,icon:"🌿",
    matchFoods:["petersilie","knoblauch","ingwer","kurkuma","oregano","rosmarin","thymian","dill","basilikum"]},
};
const HEALTH_MAX_SCORE=Object.values(HEALTH_FOOD_RANKING).reduce((a,c)=>a+c.weight,0); // = 10

function normalizeForMatch(s){
  return (s||'').toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss');
}

// Analysiert die heutigen Mahlzeiten (Freitext m.name oder m._raw) gegen die Health-Kategorien
function analyzeHealthDay(meals){
  const result={};
  Object.keys(HEALTH_FOOD_RANKING).forEach(k=>{result[k]={hits:0,present:false}});
  (meals||[]).forEach(m=>{
    const text=normalizeForMatch((m._raw||m.name||''));
    Object.entries(HEALTH_FOOD_RANKING).forEach(([key,cat])=>{
      cat.matchFoods.forEach(food=>{
        if(text.includes(normalizeForMatch(food))){
          result[key].hits++;
          result[key].present=true;
        }
      });
    });
  });
  return result;
}

function getHealthAmpel(catKey,data){
  const d=data[catKey];
  if(!d||!d.present) return{level:'red',sym:'🔴'};
  if(d.hits>=2) return{level:'green',sym:'🟢'};
  return{level:'yellow',sym:'🟡'};
}

function calcHealthScore(data){
  let score=0;
  Object.entries(HEALTH_FOOD_RANKING).forEach(([key,cat])=>{
    const ampel=getHealthAmpel(key,data);
    if(ampel.level==='green') score+=cat.weight;
    else if(ampel.level==='yellow') score+=cat.weight*0.5;
  });
  return Math.round(score*10)/10;
}

// Welche Kategorien sind rot/gelb -> für Rezeptvorschläge nutzen
function getWeakHealthCats(data){
  return Object.keys(HEALTH_FOOD_RANKING).filter(key=>{
    const ampel=getHealthAmpel(key,data);
    return ampel.level!=='green';
  });
}

// Rezepte nach Health-Score sortiert, optional gefiltert nach fehlenden Kategorien
// excludeNames: zuletzt gezeigte Rezepte vermeiden (für "Neue Vorschläge")
function getHealthRecipes(weakCats,excludeNames){
  excludeNames=excludeNames||[];
  const scored=RECIPES.map(r=>{
    const cats=r.healthCats||[];
    const matchCount=cats.filter(c=>weakCats.includes(c)).length;
    const healthTagCount=(r.healthTags||[]).length;
    return{recipe:r,score:matchCount*10+healthTagCount};
  }).filter(x=>x.score>0);
  scored.sort((a,b)=>b.score-a.score);
  let pool=scored.map(x=>x.recipe);
  // Bereits gezeigte vermeiden, aber nicht wenn dann zu wenig übrig bleibt
  const filtered=pool.filter(r=>!excludeNames.includes(r.name));
  if(filtered.length>=3) pool=filtered;
  return pool.slice(0,3);
}

function generateCoachTips(totals, goals, trainingType, profile){
  const tips=[];
  const remP=goals.protein-totals.p;
  const remC=goals.carbs-totals.c;
  const remCal=goals.cal-totals.k;
  const remF=goals.fat-totals.f;
  const isTrained=trainingType!=='rest';
  const goal=(profile||{}).goal||'recomp';

  // Protein
  if(totals.p<goals.protein*0.5 && totals.k>100){
    tips.push({icon:'💪',cls:'tip-blue',title:`Protein-Lücke: ${Math.round(remP)}g fehlen noch`,
      text:`Du hast erst ${Math.round(totals.p)}g Protein von ${goals.protein}g erreicht. Ergänze z.B. 200g Hähnchenbrust (+46g P), 250g Magerquark (+30g P) oder 200g Thunfisch (+46g P).`});
  } else if(totals.p<goals.protein*0.8 && totals.k>100){
    tips.push({icon:'🥚',cls:'tip-yellow',title:`Noch ${Math.round(remP)}g Protein bis zum Tagesziel`,
      text:`Gute Quellen für abends: Quark, Skyr, Eier, Hüttenkäse oder eine kleine Hähnchenportion.`});
  } else if(totals.p>=goals.protein){
    tips.push({icon:'✓',cls:'tip-green',title:'Protein-Ziel erreicht',
      text:`${Math.round(totals.p)}g – gut für Muskelaufbau und Recomp.`});
  }

  // Kalorien
  if(remCal>400 && totals.k>0){
    if(goal==='cut'){
      tips.push({icon:'⚖️',cls:'tip-green',title:'Kaloriendefizit im Plan',
        text:`Du bist ${Math.round(remCal)} kcal unter dem Tagesziel – beim Cut ist das in Ordnung solange du dein Proteinziel erreichst.`});
    } else {
      tips.push({icon:'🔥',cls:'tip-orange',title:`Noch ${Math.round(remCal)} kcal bis zum Ziel`,
        text:'Ergänze eine kalorienreiche aber gesunde Mahlzeit: Haferflocken mit Nüssen, Avocado-Toast oder eine Portion Reis mit Hähnchen.'});
    }
  } else if(totals.k > goals.cal*1.1 && totals.k>0){
    tips.push({icon:'⚠️',cls:'tip-red',title:'Kalorienüberschuss',
      text:`Du hast ${Math.round(totals.k-goals.cal)} kcal mehr als geplant. Für Ruhetage leichte Abendmahlzeiten wählen: Salat, Quark, Gemüse.`});
  }

  // Kohlenhydrate + Training
  if(isTrained && trainingType==='heavy' && totals.c<goals.carbs*0.6){
    tips.push({icon:'⚡',cls:'tip-blue',title:'Schweres Training – Kohlenhydrate nachfüllen',
      text:`Nach Krafttraining sind ${Math.round(remC)}g Kohlenhydrate noch offen. Reis, Kartoffeln, Haferflocken oder Bananen helfen bei der Erholung.`});
  } else if(isTrained && totals.c<goals.carbs*0.5){
    tips.push({icon:'🍚',cls:'tip-yellow',title:`${Math.round(remC)}g Kohlenhydrate offen`,
      text:'An Trainingstagen braucht dein Körper Kohlenhydrate zur Muskelregeneration. Ergänze Reis, Kartoffeln oder Obst.'});
  }

  // Ballaststoffe
  if(totals.fi<15 && totals.k>300){
    tips.push({icon:'🥦',cls:'tip-green',title:'Ballaststoffe zu niedrig',
      text:`Nur ${Math.round(totals.fi)}g von 30g Ziel. Iss mehr Gemüse, Haferflocken, Hülsenfrüchte oder Vollkornprodukte.`});
  }

  // Omega-3
  if(totals.o3<1 && totals.k>400){
    tips.push({icon:'🐟',cls:'tip-purple',title:'Omega-3 zu niedrig',
      text:'Fetter Fisch (Lachs, Hering, Makrele, Sardinen) 2–3x pro Woche oder Walnüsse und Chiasamen täglich. Nicht pauschal supplementieren – erst Ernährung anpassen.'});
  }

  // Vitamin D
  if(totals.vd<5 && totals.k>400){
    tips.push({icon:'☀️',cls:'tip-yellow',title:'Vitamin D kaum über Nahrung',
      text:'Vitamin D ist kaum über Nahrung zu erreichen (Lachs, Hering, Eier helfen etwas). 15–30 Min Sonnenlicht täglich reicht oft. Bei nachgewiesenem Mangel: Supplementierung sinnvoll.'});
  }

  // Magnesium
  if(totals.mg<200 && totals.k>300){
    tips.push({icon:'🌿',cls:'tip-green',title:'Magnesium niedrig',
      text:'Kürbiskerne, Mandeln, dunkle Schokolade, Spinat und Haferflocken sind reich an Magnesium. Sportler haben erhöhten Bedarf.'});
  }

  // Fett zu hoch
  if(totals.f>goals.fat*1.3 && totals.k>400){
    tips.push({icon:'⚠️',cls:'tip-red',title:'Fett deutlich über Ziel',
      text:`${Math.round(totals.f)}g Fett – ${Math.round(totals.f-goals.fat)}g über dem Ziel. Magere Proteinquellen bevorzugen: Magerquark, Hähnchenbrust, Thunfisch statt fettreicher Alternativen.`});
  }

  // Ruhig an Ruhetagen
  if(!isTrained && totals.k>=goals.cal*0.9 && totals.p>=goals.protein*0.8){
    tips.push({icon:'✓',cls:'tip-green',title:'Guter Ruhetag',
      text:'Kalorien und Protein passen für einen Ruhetag. Fokus auf Erholung und ausreichend Schlaf.'});
  }

  // Noch nichts geloggt
  if(totals.k<50){
    tips.push({icon:'📋',cls:'tip-yellow',title:'Heute noch nichts geloggt',
      text:'Logge deine Mahlzeiten im Log-Tab, dann gibt der Coach konkrete Empfehlungen.'});
  }

  return tips;
}

function getRecommendedRecipes(totals, goals, trainingType, profile, excludeNames){
  excludeNames=excludeNames||[];
  const goal=(profile||{}).goal||'recomp';
  const needProtein=totals.p<goals.protein*0.7;
  const needCarbs=totals.c<goals.carbs*0.5&&trainingType!=='rest';
  const needCal=totals.k<goals.cal*0.6;
  const isTrained=trainingType!=='rest';

  const scored=RECIPES.filter(r=>{
    const trainOk=r.trainDays.includes(trainingType)||r.trainDays.includes('rest');
    const goalOk=r.goalFit.includes(goal)||goal==='recomp';
    let score=0;
    if(trainOk) score++;
    if(goalOk) score++;
    if(needProtein&&r.proteinFit) score+=2;
    if(needCarbs&&r.carbFit) score+=2;
    if(needCal&&r.calFit) score++;
    return score>=2;
  }).sort((a,b)=>{
    let sa=0,sb=0;
    if(needProtein){if(a.proteinFit)sa+=2;if(b.proteinFit)sb+=2;}
    if(needCarbs){if(a.carbFit)sa+=2;if(b.carbFit)sb+=2;}
    return sb-sa;
  });

  const filtered=scored.filter(r=>!excludeNames.includes(r.name));
  const pool=filtered.length>=3?filtered:scored;
  return pool.slice(0,4);
}

// WOCHENANALYSE
// ═══════════════════════════════════════════════════════════════════
function buildWeekAnalysis(){
  const d=loadN();
  const profile=d.profile||{};
  const last7=getLastNDays(7);
  const wlog=d.weightLog||{};

  const weekDays=last7.map(k=>{
    const day=(d.days||{})[k]||{trainingType:'rest',meals:[]};
    const totals=sumMeals(day.meals);
    const goals=calcGoals(day.trainingType||'rest',profile);
    return{date:k,totals,goals,trainingType:day.trainingType||'rest',hasData:(day.meals||[]).length>0};
  });

  const daysWithData=weekDays.filter(d=>d.hasData);
  const trainingDays=weekDays.filter(d=>d.trainingType!=='rest'&&d.hasData);

  const avg=(arr,fn)=>arr.length?Math.round(arr.reduce((a,b)=>a+fn(b),0)/arr.length):0;

  const avgCal=avg(daysWithData,d=>d.totals.k);
  const avgProt=avg(daysWithData,d=>d.totals.p);
  const avgCarbs=avg(daysWithData,d=>d.totals.c);
  const avgFat=avg(daysWithData,d=>d.totals.f);
  const avgFiber=avg(daysWithData,d=>d.totals.fi);
  const avgProtGoal=avg(daysWithData,d=>d.goals.protein);
  const avgCalGoal=avg(daysWithData,d=>d.goals.cal);

  // Mikro-Defizit-Analyse (14 Tage)
  const last14=getLastNDays(14);
  const microCounts={mg:0,ca:0,fe2:0,zn:0,po:0,o3:0,vd:0};
  let validDays14=0;
  const microGoals={mg:400,ca:1000,fe2:15,zn:10,po:3500,o3:2,vd:20};
  last14.forEach(k=>{
    const day=(d.days||{})[k];
    if(!day||(day.meals||[]).length===0) return;
    validDays14++;
    const t=sumMeals(day.meals);
    Object.keys(microCounts).forEach(mk=>{
      if(pct(t[mk]||0,microGoals[mk])<60) microCounts[mk]++;
    });
  });

  // Gewichtsverlauf
  const weights=last7.map(k=>wlog[k]).filter(Boolean);
  let weightTrend=null;
  if(weights.length>=2){
    weightTrend={from:weights[0],to:weights[weights.length-1],diff:round1(weights[weights.length-1]-weights[0])};
  }

  // Verbesserungen
  const improvements=[];
  if(avgProt<avgProtGoal*0.8) improvements.push(`Protein erhöhen: Ø ${avgProt}g statt ${avgProtGoal}g Ziel. Täglich Quark, Hähnchen oder Eier einplanen.`);
  if(avgFiber<20) improvements.push(`Ballaststoffe erhöhen: Ø ${avgFiber}g. Mehr Gemüse, Haferflocken und Hülsenfrüchte.`);
  if(microCounts.o3>=5) improvements.push(`Omega-3 fehlt häufig (${microCounts.o3}/${validDays14} Tage). 2x pro Woche fetten Fisch einplanen.`);
  if(microCounts.mg>=5) improvements.push(`Magnesium oft zu niedrig (${microCounts.mg}/${validDays14} Tage). Kürbiskerne, Mandeln, Spinat regelmäßig essen.`);
  if(microCounts.vd>=8) improvements.push(`Vitamin D kaum über Nahrung (${microCounts.vd}/${validDays14} Tage). Täglich Sonnenlicht; ggf. Supplement prüfen.`);
  if(daysWithData.length<4) improvements.push(`Nur ${daysWithData.length} von 7 Tagen geloggt. Konsequenteres Logging hilft bei der Analyse.`);
  if(trainingDays.length>0){
    const avgCarbTraining=avg(trainingDays,d=>d.totals.c);
    if(avgCarbTraining<trainingDays[0]?.goals.carbs*0.6) improvements.push('Kohlenhydrate an Trainingstagen erhöhen für bessere Erholung.');
  }
  if(improvements.length===0) improvements.push('Sehr gute Woche! Weiter so.');

  // Supplement-Hinweise
  const suppHints=[];
  if(microCounts.mg>=8) suppHints.push({n:'Magnesium',pattern:`${microCounts.mg}/${validDays14} Tage unter 60%`,food:'Kürbiskerne, Mandeln, Spinat, Haferflocken, dunkle Schokolade',supp:'Magnesiumglycinat 300mg abends – nur wenn Ernährungsquellen nicht ausreichen'});
  if(microCounts.vd>=10) suppHints.push({n:'Vitamin D',pattern:`${microCounts.vd}/${validDays14} Tage unter 60%`,food:'Lachs, Hering, Eier – aber kaum ausreichend über Nahrung',supp:'Vitamin D3 1000–2000 IE täglich sinnvoll in Herbst/Winter – Blutwert prüfen'});
  if(microCounts.o3>=8) suppHints.push({n:'Omega-3',pattern:`${microCounts.o3}/${validDays14} Tage unter Ziel`,food:'Lachs, Makrele, Sardinen, Hering 2–3x/Woche; Walnüsse, Chiasamen täglich',supp:'Fischöl-Kapsel 1–2g EPA+DHA nur wenn Fisch dauerhaft wenig gegessen wird'});

  return{weekDays,daysWithData,avgCal,avgProt,avgCarbs,avgFat,avgFiber,avgCalGoal,avgProtGoal,weightTrend,improvements,suppHints,microCounts,validDays14};
}

function renderHealth(){
  const d=loadN();
  const today=todayKey();
  const dayData=(d.days||{})[today]||{meals:[]};
  const meals=dayData.meals||[];
  const healthData=analyzeHealthDay(meals);

  const weakCats=getWeakHealthCats(healthData);

  return`

    <div class="card-title">Health-Score heute</div>

      ${score}<span style="font-size:20px;color:#999">/${HEALTH_MAX_SCORE}</span>
    </div>
    <div style="font-size:12px;font-family:'Courier New',monospace;color:#888;margin-top:6px">
      Basierend auf den heute geloggten Mahlzeiten · Gemüse & Proteinquellen doppelt gewichtet
    </div>
  </div>

  <!-- KATEGORIEN AMPEL -->
  <div class="card">
    <div class="card-title">Kategorien heute</div>
    ${Object.entries(HEALTH_FOOD_RANKING).map(([key,cat])=>{
      const ampel=getHealthAmpel(key,healthData);
      const hits=healthData[key].hits;
      const weightLabel=cat.weight===2?' (2 Punkte)':'';
      return`<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #e8e4dc">
        <span style="font-size:20px">${ampel.sym}</span>
        <span style="font-size:18px">${cat.icon}</span>
        <div style="flex:1">
          <div style="font-size:14px;color:#111">${cat.label}<span style="font-size:11px;color:#999;font-family:'Courier New',monospace">${weightLabel}</span></div>
          <div style="font-size:11px;font-family:'Courier New',monospace;color:#888">${hits>0?`${hits}x heute erkannt`:'noch nicht dabei'}</div>
        </div>
      </div>`;
    }).join('')}
  </div>

  ${meals.length===0?`
  <div class="card">
    <div style="font-size:13px;color:#888;font-family:'Courier New',monospace;text-align:center;padding:10px 0">
      Noch keine Mahlzeiten heute geloggt. Trage im Log-Tab etwas ein, dann erscheint hier die Auswertung.
    </div>
  </div>`:''}

  <!-- REZEPTVORSCHLÄGE FÜR SCHWACHE KATEGORIEN -->
  ${weakCats.length>0&&meals.length>0?`
  <div class="card-title" style="margin-bottom:10px">
    Empfehlungen für: ${weakCats.map(k=>HEALTH_FOOD_RANKING[k].label).join(', ')}
  </div>
  <button class="btn-sm" style="width:100%;margin-bottom:14px;text-align:center" onclick="refreshHealthRecipes()">🔄 Neue Vorschläge</button>
  ${getHealthRecipes(weakCats,S.lastHealthRecipes).map(r=>renderHealthRecipeCard(r)).join('')}
  `:''}

  ${weakCats.length===0&&meals.length>0?`
  <div class="card" style="border-left:3px solid #2e7d32">
    <div style="font-size:14px;color:#1b5e20;font-family:'Courier New',monospace;font-weight:600">✓ Alle Kategorien heute gut abgedeckt!</div>
  </div>`:''}`;
}

function renderHealthRecipeCard(r){
  return`<div class="recipe-card">
    <div class="recipe-header">
      <div class="recipe-name">${r.name}</div>
      <div class="recipe-badge" style="background:#e8f5e9;color:#1b5e20;border-color:#a5d6a7">🌿 Health</div>
    </div>
    <div class="recipe-why" style="color:#1b5e20">✓ ${r.healthWhy||r.why}</div>
    <div class="recipe-macros">${r.macros}</div>
    <div style="margin-bottom:8px">${(r.healthCats||[]).map(c=>`<span class="recipe-tag" style="border-color:#a5d6a7;color:#1b5e20">${HEALTH_FOOD_RANKING[c]?.label||c}</span>`).join('')}</div>
    <div class="recipe-ingredients">
      ${r.ingredients.map(i=>`<div class="recipe-ingredient">· ${i}</div>`).join('')}
    </div>
    <div class="recipe-prep">${r.prep}</div>
  </div>`;
}

function refreshHealthRecipes(){
  const d=loadN();
  const today=todayKey();
  const dayData=(d.days||{})[today]||{meals:[]};
  const healthData=analyzeHealthDay(dayData.meals||[]);
  const weakCats=getWeakHealthCats(healthData);
  const current=getHealthRecipes(weakCats,S.lastHealthRecipes);
  S.lastHealthRecipes=current.map(r=>r.name);
  render();
}

function renderRecipes(){
  const d=loadN();
  const today=todayKey();
  const dayData=(d.days||{})[today]||{trainingType:'rest',meals:[]};
  return`
  <div class="card">
    <div class="card-title">Alle Rezepte (${RECIPES.length})</div>
    <div style="font-size:12px;font-family:'Courier New',monospace;color:#888;margin-bottom:14px">Schnell, einfach, auf dein Ziel abgestimmt</div>
    ${RECIPES.map(r=>renderRecipeCard(r)).join('')}
  </div>`;
}

function renderRecipeCard(r){
  return`<div class="recipe-card">
    <div class="recipe-header">
      <div class="recipe-name">${r.name}</div>
      <div class="recipe-badge ${r.badgeClass}">${r.badge}</div>
    </div>
    <div class="recipe-why">✓ ${r.why}</div>
    <div class="recipe-macros">${r.macros}</div>
    <div style="margin-bottom:8px">${r.tags.map(t=>`<span class="recipe-tag">${t}</span>`).join('')}</div>
    <div class="recipe-ingredients">
      ${r.ingredients.map(i=>`<div class="recipe-ingredient">· ${i}</div>`).join('')}
    </div>
    <div class="recipe-prep">${r.prep}</div>
  </div>`;
}

function renderWeek(){
  const a=buildWeekAnalysis();
  const microLabels={mg:'Magnesium',ca:'Calcium',fe2:'Eisen',zn:'Zink',po:'Kalium',o3:'Omega-3',vd:'Vitamin D'};
  const microGoals={mg:400,ca:1000,fe2:15,zn:10,po:3500,o3:2,vd:20};
  const microUnits={mg:'mg',ca:'mg',fe2:'mg',zn:'mg',po:'mg',o3:'g',vd:'μg'};

  return`
  <!-- ÜBERSICHT -->
  <div class="card">
    <div class="card-title">7-Tage Übersicht</div>
    <div class="stat-grid" style="margin-bottom:16px">
      <div class="stat-box"><div class="stat-val">${a.avgCal}</div><div class="stat-lbl">Ø kcal / Tag</div></div>
      <div class="stat-box"><div class="stat-val" style="color:#1565c0">${a.avgProt}g</div><div class="stat-lbl">Ø Protein / Tag</div></div>
      <div class="stat-box"><div class="stat-val" style="color:#2e7d32">${a.avgCarbs}g</div><div class="stat-lbl">Ø Kohlenhydrate</div></div>
      <div class="stat-box"><div class="stat-val">${a.avgFiber}g</div><div class="stat-lbl">Ø Ballaststoffe</div></div>
    </div>
    ${a.weekDays.map((d,i)=>{
      const calP=pct(d.totals.k,d.goals.cal);
      const protP=pct(d.totals.p,d.goals.protein);
      const{c:cc}=ampel(calP);
      const{c:pc}=ampel(protP);
      const icon={rest:'🛋️',upper:'💪',lower:'🦵',full:'🔥',heavy:'🏋️'}[d.trainingType]||'🛋️';
      return`<div class="week-row" style="${i===6?'border-bottom:none':''}">
        <div class="week-label">${dateLabel(d.date)}</div>
        <span style="font-size:13px;flex-shrink:0">${icon}</span>
        ${d.hasData?`
        <div class="week-bar-wrap" style="margin:0 4px">
          <div class="week-bar-fill" style="width:${calP}%;background:${cc}"></div>
        </div>
        <div class="week-nums">
          <div style="color:${cc}">${Math.round(d.totals.k)}kcal</div>
          <div style="color:${pc};font-size:10px">${Math.round(d.totals.p)}g P</div>
        </div>`:`<span style="color:#ddd;font-size:11px;font-family:'Courier New',monospace;flex:1;margin-left:8px">kein Log</span>`}
      </div>`;
    }).join('')}
  </div>

  ${a.weightTrend?`
  <div class="card">
    <div class="card-title">Gewichtstrend</div>
    <div style="display:flex;gap:20px;align-items:center">
      <div><div class="stat-val">${a.weightTrend.from} kg</div><div class="stat-lbl">Vor 7 Tagen</div></div>
      <div style="font-size:20px;color:#aaa">→</div>
      <div><div class="stat-val">${a.weightTrend.to} kg</div><div class="stat-lbl">Heute</div></div>
      <div><div class="stat-val" style="color:${a.weightTrend.diff<0?'#2e7d32':a.weightTrend.diff>0?'#e65100':'#888'}">${a.weightTrend.diff>0?'+':''}${a.weightTrend.diff} kg</div><div class="stat-lbl">Veränderung</div></div>
    </div>
  </div>`:''}

  <!-- MIKRONÄHRSTOFF-MUSTER (14T) -->
  <div class="card">
    <div class="card-title">Mikronährstoff-Muster (14 Tage · ${a.validDays14} geloggte Tage)</div>
    ${Object.keys(a.microCounts).map(mk=>{
      const count=a.microCounts[mk];
      const fillP=Math.round((1-count/Math.max(a.validDays14,1))*100);
      const{c}=ampel(fillP);
      return`<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;color:#444">${microLabels[mk]}</span>
          <span style="font-size:11px;font-family:'Courier New',monospace;color:${count>=3?'#c62828':'#2e7d32'}">${count}/${a.validDays14} Tage unter Ziel</span>
        </div>
        <div style="height:5px;border-radius:3px;background:#f0ede8;overflow:hidden">
          <div style="height:100%;width:${fillP}%;background:${c};border-radius:3px"></div>
        </div>
      </div>`;
    }).join('')}
  </div>

  <!-- VERBESSERUNGEN -->
  <div class="card">
    <div class="card-title">Empfehlungen für nächste Woche</div>
    ${a.improvements.map((imp,i)=>`
      <div class="improvement-row" style="${i===a.improvements.length-1?'border-bottom:none':''}">
        <span class="improvement-num">${i+1}.</span>
        <span style="font-size:13px;color:#444;line-height:1.5">${imp}</span>
      </div>`).join('')}
  </div>

  <!-- SUPPLEMENT COACH -->
  ${a.suppHints.length?`
  <div class="card">
    <div class="card-title">Supplement-Coach</div>
    <div style="font-size:12px;font-family:'Courier New',monospace;color:#888;margin-bottom:12px">Nur bei wiederkehrenden Mustern · immer zuerst über Nahrung</div>
    ${a.suppHints.map(h=>`
      <div style="background:#f7f6f2;border:1px solid #e8e6e0;border-radius:10px;padding:13px;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <span style="font-size:15px">⚠</span>
          <span style="font-size:14px;color:#1a1a1a">${h.n}</span>
        </div>
        <div style="font-size:11px;font-family:'Courier New',monospace;color:#888;margin-bottom:8px">${h.pattern}</div>
        <div style="background:#f0faf0;border:1px solid #c8e6c8;border-radius:7px;padding:8px 11px;margin-bottom:6px">
          <span style="font-size:10px;font-family:'Courier New',monospace;color:#2e7d32;text-transform:uppercase">Über Nahrung ▸ </span>
          <span style="font-size:12px;color:#444">${h.food}</span>
        </div>
        <div style="background:#fff;border:1px solid #e8e6e0;border-radius:7px;padding:8px 11px">
          <span style="font-size:10px;font-family:'Courier New',monospace;color:#6a1b9a;text-transform:uppercase">Supplement ▸ </span>
          <span style="font-size:12px;color:#888">${h.supp}</span>
        </div>
      </div>`).join('')}
  </div>`:''}`;
}

function renderWeight(){
  const d=loadN();
  const wlog=d.weightLog||{};
  const last14=getLastNDays(14);
  const entries=last14.map(k=>({date:k,w:wlog[k]})).filter(e=>e.w);

  let bars='<div class="empty-note">Noch kein Gewicht eingetragen</div>';
  if(entries.length>0){
    const min=Math.min(...entries.map(e=>e.w))-1;
    const max=Math.max(...entries.map(e=>e.w))+1;
    bars=entries.map((e,i)=>{
      const bw=Math.round((e.w-min)/(max-min)*100);
      const diff=i>0?(e.w-entries[i-1].w).toFixed(1):null;
      const dc=diff===null?'':parseFloat(diff)<0?'#2e7d32':parseFloat(diff)>0?'#e65100':'#aaa';
      return`<div class="weight-row">
        <div class="weight-label">${dateLabel(e.date)}</div>
        <div class="weight-bar-wrap"><div class="weight-bar-fill" style="width:${bw}%"></div></div>
        <div style="min-width:90px;text-align:right;font-family:'Courier New',monospace;font-size:13px">
          ${e.w} kg${diff!==null?`<span style="font-size:10px;color:${dc};margin-left:4px">${parseFloat(diff)>0?'+':''}${diff}</span>`:''}
        </div>
      </div>`;
    }).join('');
  }

  return`
  <div class="card">
    <div class="card-title">Gewicht erfassen</div>
    <div style="display:flex;gap:10px">
      <input class="field-input" style="flex:1" type="number" step="0.1" placeholder="z.B. 79.5"
        id="w-input" value="${S.weightInput}" oninput="S.weightInput=this.value"/>
      <button class="btn-sm" style="flex-shrink:0" onclick="saveWeight()" ${!S.weightInput?'disabled':''}>OK</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Verlauf (14 Tage)</div>
    ${bars}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// AKTIONEN
// ═══════════════════════════════════════════════════════════════════
function saveWeight(){
  const v=parseFloat(S.weightInput);
  if(!v) return;
  const d=loadN();
  if(!d.weightLog) d.weightLog={};
  d.weightLog[todayKey()]=v;
  saveN({weightLog:d.weightLog});
  S.weightInput='';
  render();
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
render();
</script>
